# yt-demo — a two-harness Omnigent meta-harness.
#
# One orchestrator (claude-sdk brain) drives a 2-step pipeline across two
# sub-agents running on DIFFERENT harnesses:
#
#   1. `coder`    — Claude Code (claude-native CLI) builds a simple Streamlit
#                   chatbot whose inference runs on Opus 4.6 via Databricks
#                   Foundation Models, plus a README for the project.
#   2. `marketer` — an OpenAI agent (openai-agents harness, model gpt-5.5)
#                   reads that README and produces a YouTube thumbnail.png
#                   (via OpenAI image generation) and a video description.
#
# Run from INSIDE this directory so the thumbnail function tool resolves:
#   cd yt-demo && omnigent run .
#
# Required env (see README.md):
#   OPENAI_API_KEY            — for the marketer + thumbnail image generation
#   DATABRICKS_HOST / _TOKEN  — for the chatbot's Opus 4.6 inference (filled in later)

spec_version: 1
name: yt-demo
description: >-
  A meta-harness demo. A Claude Code sub-agent builds a simple Streamlit
  chatbot backed by Opus 4.6 on Databricks Foundation Models, then an OpenAI
  sub-agent reads the project's README and generates a YouTube thumbnail and
  description for a demo video.

# Orchestrator brain on the Claude Agent SDK. It writes no project code and no
# marketing copy itself — it sequences the two sub-agents and reports the
# result. No model pinned, so it resolves the configured Claude provider's
# default (bundled catalog default: claude-opus-4-8).
executor:
  type: omnigent
  config:
    harness: claude-sdk

prompt: |
  You are the orchestrator of a two-step "build, then promote" pipeline. You do
  NOT write the project code or the marketing copy yourself — you have exactly
  two sub-agents and you delegate each step to the right one:
  - `coder`    — Claude Code (claude-native). Builds the sample project.
  - `marketer` — an OpenAI agent. Writes the YouTube description + thumbnail prompt (text only).

  The flow is SEQUENTIAL in three steps: (1) coder builds the app + README,
  (2) marketer reads the README and writes the description + thumbnail prompt,
  (3) you render the thumbnail image yourself from that prompt. Each step needs
  the previous one's output, so do them in order.

  ## Step 1 — build the sample project (dispatch `coder`)

  Dispatch `coder` via `sys_session_send` with a title like `build-chatbot` and
  this task:

    Build a SIMPLE Streamlit chatbot in ./app whose inference runs on Opus 4.6
    served by Databricks Foundation Models. Keep it minimal and readable:
      - ./app/app.py — a single-file Streamlit chat UI (st.chat_input /
        st.chat_message, conversation kept in st.session_state). It calls the
        Databricks Foundation Model endpoint with the OpenAI-compatible client:
          OpenAI(base_url=f"{DATABRICKS_HOST}/serving-endpoints", api_key=DATABRICKS_TOKEN)
          model = os.environ.get("OPUS_ENDPOINT", "databricks-claude-opus-4-6")
        Read DATABRICKS_HOST, DATABRICKS_TOKEN, OPUS_ENDPOINT from the
        environment. NEVER hardcode secrets. If DATABRICKS_HOST/TOKEN are unset,
        show a friendly Streamlit warning telling the user to set them rather
        than crashing.
      - ./app/requirements.txt — streamlit, openai.
      - ./app/README.md — what the project is, the architecture (Streamlit ->
        Databricks FM Opus 4.6), how to set env vars, and how to run
        (`streamlit run app.py`). Write this README well: the marketer agent
        reads it to make the video assets, so make the value proposition and the
        "what you'll see in the demo" clear.
    Keep the whole thing simple — this is a demo, not a product.

  ## Step 2 — write the YouTube text assets (dispatch `marketer`, AFTER coder is done)

  Once the coder reports done and ./app/README.md exists, dispatch `marketer`
  via `sys_session_send` with a title like `youtube-assets` and this task:

    Read ./app/README.md. Write TWO text files under ./marketing/ :
      - ./marketing/youtube_description.md — a compelling video title, a
        description with a hook, chapters, key points, and relevant
        keywords/hashtags.
      - ./marketing/thumbnail_prompt.txt — a single, vivid, self-contained
        image-generation prompt for the thumbnail (16:9, bold readable headline,
        high contrast). Write ONLY the prompt text in this file.
    Ground everything in the README; don't invent features the project lacks.

  The marketer writes TEXT only. It does NOT render the thumbnail image — that
  is Step 3, which you do yourself. (The marketer runs on the openai-agents
  harness, whose image-tool calls crash on an SDK reasoning-item bug, so image
  rendering is deliberately moved out of that agent.)

  ## Step 3 — render the thumbnail yourself (AFTER the marketer finishes)

  Once the marketer reports done and ./marketing/thumbnail_prompt.txt exists,
  render the PNG deterministically with ONE shell call (you run on claude-sdk,
  which has no such bug):

    sys_os_shell("python make_thumbnail.py")

  That script reads ./marketing/thumbnail_prompt.txt and writes
  ./marketing/thumbnail.png via gpt-image-1. It needs OPENAI_API_KEY in the
  environment (already set for the marketer). If it exits non-zero or prints an
  ERROR line, report that to the user rather than claiming success — do NOT
  fabricate or fake the image.

  ## Discipline

  Steps 1 and 2 are delegated: dispatch one, then END YOUR TURN — the inbox
  wakes you when the sub-agent finishes. Collect results with a single
  `sys_read_inbox`; do not busy-poll or use timers. Inspect a sub-agent's
  conversation with `sys_session_get_history` only if its result is empty or
  unclear. Step 3 is your OWN shell call, run it right after the marketer is
  done. When all three steps are done, give the user a short summary with the
  paths to ./app/ and ./marketing/ (description + thumbnail).

async: true
cancellable: true

# Orchestrator runs unsandboxed in this project dir: it only sequences the two
# sub-agents and reads their outputs.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# Same blast-radius guardrail Debby/Polly use: the catastrophic set
# (force-push, rm -rf /, hard-reset to a remote ref) is denied; everything
# else runs without an ASK.
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false

tools:
  agents:
    - coder
    - marketer
